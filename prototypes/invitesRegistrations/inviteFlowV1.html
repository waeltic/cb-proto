    const $ = (id) => document.getElementById(id);
    const t = (key) => (i18n[state.lang] && i18n[state.lang][key]) || key;

    function input(label, value = '') {
      return `<div><label class="mb-2 block text-sm font-medium">${t(label)}</label><input class="w-full rounded-xl border px-4 py-3" value="${value}" /></div>`;
    }

    function select(label, opts) {
      return `<div><label class="mb-2 block text-sm font-medium">${t(label)}</label><select class="w-full rounded-xl border px-4 py-3">${opts.map(o => `<option>${t(o)}</option>`).join('')}</select></div>`;
    }

    function Stepper({ items, active }) {
      return items.map((item, idx) => `
        <span class="${idx <= active ? 'text-emerald-700 font-medium' : 'text-slate-400'}">${t(item)}</span>
        ${idx < items.length - 1 ? '<span class="text-slate-300">›</span>' : ''}
      `).join('');
    }

    function injectSteppers() {
      document.querySelectorAll('[data-stepper]').forEach(el => {
        const items = el.dataset.stepper.split(',');
        const active = Number(el.dataset.active || 0);
        el.innerHTML = Stepper({ items, active });
      });
    }

    function renderForms() {
      const child = `
        <h3>${t('personal')}</h3>
        <div class="grid gap-4 md:grid-cols-2">${input('first_name', 'Leana')}${input('last_name', 'Winter')}${input('birthdate', '2014-10-11')}${select('gender', ['gender'])}</div>
        <h3>${t('email')} / ${t('phone')}</h3>
        <div class="grid gap-4 md:grid-cols-2">${input('email', state.email)}${input('phone')}</div>
        <h3>${t('emergency')}</h3>
        <div class="grid gap-4 md:grid-cols-2">${input('emergency_name')}${input('emergency_phone')}</div>
        <h3>${t('address')}</h3>
        <div class="grid gap-4 md:grid-cols-2">${input('street', 'Teststrasse 1')}${input('zip', '8888')}${input('city', 'London')}</div>
      `;

      ['child-form', 'child-form-parent'].forEach(id => {
        const el = $(id);
        if (el) el.innerHTML = child;
      });

      const parentForm = $('parent-form');
      if (parentForm) {
        parentForm.innerHTML = `
          <h3>${t('personal')}</h3>
          <div class="grid gap-4 md:grid-cols-2">${input('first_name')}${input('last_name')}${input('birthdate')}${select('gender', ['gender'])}</div>
          <h3>${t('email')} / ${t('phone')}</h3>
          <div class="grid gap-4 md:grid-cols-2">${input('email', state.email)}${input('phone')}</div>
          <h3>${t('relationship')}</h3>
          <div class="grid gap-4 md:grid-cols-2">${select('relationship', ['mother', 'father', 'guardian'])}${input('phone')}</div>
          <h3>${t('address')}</h3>
          <div class="grid gap-4 md:grid-cols-2">${input('street')}${input('zip')}${input('city')}</div>
        `;
      }
    }

    function render() {
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
      ['entry-email', 'auth-email', 'setup-email'].forEach(id => {
        const el = $(id);
        if (el && document.activeElement !== el) el.value = state.email;
      });
      const loggedUser = $('logged-user');
      if (loggedUser) loggedUser.textContent = state.email;
      document.querySelectorAll('[data-lang-btn]').forEach(btn => {
        btn.className = btn.dataset.langBtn === state.lang
          ? 'rounded-full bg-slate-900 px-3 py-1.5 text-xs font-medium text-white'
          : 'rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-600';
      });
      injectSteppers();
      renderForms();
    }

    function setLang(lang) {
      state.lang = lang;
      document.documentElement.lang = lang;
      render();
    }

    function syncEmail(id) {
      const el = $(id);
      if (el && el.value) state.email = el.value;
    }

    function go(id) {
      state.current = id;
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      const target = $(id);
      if (target) target.classList.remove('hidden');
      window.scrollTo(0, 0);
      render();
    }

    function loginExisting() { syncEmail('entry-email'); go('auth-existing'); }
    function createAccount() { syncEmail('entry-email'); go('account-setup'); }
    function submitLogin() { syncEmail('auth-email'); go('routing'); }

    function submitAccount() {
      const checkbox = $('terms-checkbox');
      const error = $('terms-error');
      if (!checkbox || !checkbox.checked) {
        if (error) error.classList.remove('hidden');
        return;
      }
      if (error) error.classList.add('hidden');
      syncEmail('setup-email');
      go('routing');
    }

    function routeParentForced() { state.loggedPerson = 'normal'; go('pre-parent-forced'); }
    function routeParentNormal() { state.loggedPerson = 'normal'; go('pre-parent'); }
    function routeParentWithExistingPerson() { state.loggedPerson = 'has-person'; go('pre-parent'); }
    function routeParentNoPersonWithExistingParents() { state.loggedPerson = 'no-person-existing-parents'; go('pre-parent'); }
    function parentIntroNext() { go('child-parent'); }
    function afterChildParent() {
      if (state.loggedPerson === 'has-person') {
        go('parent-identity');
      } else if (state.loggedPerson === 'no-person-existing-parents') {
        go('parent-existing-select');
      } else {
        go('parent-details');
      }
    }

    function runTests() {
      console.assert(typeof render === 'function', 'render should be defined before DOMContentLoaded');
      console.assert(typeof afterChildParent === 'function', 'afterChildParent should exist');
      console.assert(typeof routeParentNormal === 'function', 'normal parent route should exist');
      console.assert(document.getElementById('parent-existing-select'), 'existing parent selection screen should exist');
      console.assert(i18n.de.legal_parent_summary.endsWith('.') || i18n.de.legal_parent_summary.endsWith('n.'), 'German legal_parent_summary should be valid text');
      console.assert(i18n.de.already_title, 'German i18n object should continue after legal_parent_summary');
      console.assert(i18n.en.done_self === 'Welcome to the club', 'Final page should be a welcome page');
      console.assert(document.getElementById('start'), 'Start screen should exist');
      console.assert(document.querySelectorAll('.screen').length > 5, 'Prototype should contain multiple screens');
    }

    window.addEventListener('DOMContentLoaded', () => {
      runTests();
      render();
    });
  </script>
