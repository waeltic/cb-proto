    const state = { lang: 'en', email: 'test@test.ch' };

    function t(key) { return i18n[state.lang][key] || key; }
    function setLang(lang) { state.lang = lang; document.documentElement.lang = lang; render(); }
    function go(id) {
      document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
      const target = document.getElementById(id);
      if (target) target.classList.remove('hidden');
      render();
    }
    function syncEmailFrom(id) {
      const el = document.getElementById(id);
      if (el) state.email = el.value || 'test@test.ch';
    }
    function continueExistingAccount() { syncEmailFrom('entry-email'); go('auth-existing'); }
    function continueNewAccount() { syncEmailFrom('entry-email'); go('account-setup'); }
    function render() {
      document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = t(el.dataset.i18nPlaceholder));
      ['entry-email','auth-email','setup-email','player-email','parent-email'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = state.email;
      });
      document.querySelectorAll('[data-lang-btn]').forEach(btn => {
        const active = btn.dataset.langBtn === state.lang;
        btn.className = active ? 'rounded-full bg-slate-900 px-3 py-1.5 text-xs font-medium text-white' : 'rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-600';
      });
    }
    window.addEventListener('DOMContentLoaded', render);
  </script>
